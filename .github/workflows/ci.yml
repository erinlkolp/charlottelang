name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Smoke test — hello.bark
        run: python charlotte.py run examples/hello.bark

      - name: Smoke test — fizzbuzz.bark
        run: python charlotte.py run examples/fizzbuzz.bark

      - name: Smoke test — full_day.bark
        run: python charlotte.py run examples/full_day.bark

      - name: Smoke test — new_features.bark
        run: python charlotte.py run examples/new_features.bark
